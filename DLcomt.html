<html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>斗罗大陆·启魂录</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&amp;display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#080810;--bg2:#0e0e1a;--bg3:#161625;--bg4:#1e1e30;
--gold:#c9a84c;--goldL:#e8d48b;--goldD:#8a6d2b;--goldG:rgba(201,168,76,.12);
--red:#c0392b;--redD:#8b2020;
--txt:#e8e0d0;--txt2:#a09880;--txt3:#605848;
--bdr:#252538;--bdrG:rgba(201,168,76,.25);
--fs:15px;--ff:'Noto Serif SC',serif;
--glow:0 0 20px rgba(201,168,76,.15);
}
body.t-ink{--bg:#f5f0e6;--bg2:#ede5d5;--bg3:#faf5eb;--bg4:#f0e8d5;--txt:#2c2416;--txt2:#6b5d4d;--txt3:#a09078;--bdr:#d4c8b0;--bdrG:rgba(139,109,43,.25)}
body.t-cyber{--bg:#06001a;--bg2:#0e0030;--bg3:#180048;--bg4:#220060;--gold:#00e8ff;--goldL:#80f8ff;--goldD:#0090a0;--bdr:#2a0060;--bdrG:rgba(0,232,255,.2)}
body.t-blood{--bg:#0c0404;--bg2:#180808;--bg3:#2a0e0e;--bg4:#3a1616;--gold:#e04040;--goldL:#ff8888;--goldD:#a02020;--bdr:#3e1a1a;--bdrG:rgba(224,64,64,.2)}
body.t-jade{--bg:#040e08;--bg2:#081810;--bg3:#0e2818;--bg4:#143820;--gold:#4caf50;--goldL:#81c784;--goldD:#2e7d32;--bdr:#1a3e2a;--bdrG:rgba(76,175,80,.2)}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font:var(--fs)/1.65 var(--ff)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--goldD);border-radius:2px}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}.screen.active{display:flex}
/* ---- BTN ---- */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:.55em 1.6em;border:1px solid var(--bdrG);background:var(--goldG);color:var(--gold);font:inherit;font-size:.88em;cursor:pointer;transition:.25s;letter-spacing:.08em;gap:.4em}
.btn:hover{background:rgba(201,168,76,.18);border-color:var(--gold);box-shadow:var(--glow)}
.btn.pri{background:rgba(201,168,76,.14);border-color:var(--gold)}.btn.sm{padding:.35em .9em;font-size:.8em}
.btn.dis{opacity:.35;cursor:not-allowed;pointer-events:none}
/* ---- COVER ---- */
#cover{justify-content:center;align-items:center;text-align:center;background:#000}
#cover .cbg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.55;filter:brightness(.65) saturate(.8)}
#cover .cc{position:relative;z-index:1}
#cover h1{font-size:2.2em;color:var(--gold);text-shadow:0 0 40px rgba(201,168,76,.4),0 2px 8px rgba(0,0,0,.6);letter-spacing:.18em;margin-bottom:.2em}
#cover .sub{color:var(--goldL);font-size:.85em;opacity:.6;margin-bottom:2.2em;letter-spacing:.3em}
#cover .bg{display:flex;flex-direction:column;gap:.7em;align-items:center}
#cover .bg .btn{min-width:190px}
/* ---- API ---- */
#api-setup{justify-content:center;align-items:center;padding:1.5em}
.sbox{background:var(--bg3);border:1px solid var(--bdr);padding:1.8em;max-width:420px;width:100%;border-radius:4px}
.sbox h2{color:var(--gold);text-align:center;margin-bottom:1.2em;font-size:1.2em;letter-spacing:.1em}
.fg{margin-bottom:.9em}.fg label{display:block;color:var(--txt2);font-size:.8em;margin-bottom:.25em}
.fg input,.fg select{width:100%;padding:.55em .7em;background:var(--bg2);border:1px solid var(--bdr);color:var(--txt);font:inherit;font-size:.85em;border-radius:2px}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--goldD)}
.fr{display:flex;gap:.7em;justify-content:center;margin-top:1.3em}
/* ---- CHAR CREATE ---- */
#char-create{padding:1.2em;overflow-y:auto;align-items:center}
.avup{width:90px;height:90px;margin:0 auto .8em;border:2px dashed var(--bdrG);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:var(--bg2);transition:.3s}
.avup:hover{border-color:var(--gold);box-shadow:var(--glow)}
.avup img{width:100%;height:100%;object-fit:cover}.avup span{color:var(--txt3);font-size:.7em;text-align:center}
.mtog{display:flex;margin-bottom:1em}.mtog .btn{flex:1;border-radius:0}.mtog .btn.ac{background:rgba(201,168,76,.18);border-color:var(--gold)}
.rg{display:flex;gap:1em;margin-top:.2em}.rg label{display:flex;align-items:center;gap:.3em;cursor:pointer;color:var(--txt2);font-size:.88em}.rg input{accent-color:var(--gold)}
/* ---- GAME ---- */
#game{flex-direction:column}
#ghd{padding:.45em .8em;background:var(--bg2);border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;min-height:42px}
.pb{display:flex;align-items:center;gap:.5em}.pb .mav{width:28px;height:28px;border-radius:50%;border:1px solid var(--goldD);object-fit:cover}
.pb .nm{color:var(--gold);font-size:.85em}.pb .lv{color:var(--txt2);font-size:.75em}
#gc{flex:1;overflow:hidden;position:relative}
.tp{position:absolute;inset:0;overflow-y:auto;padding:.8em;display:none;-webkit-overflow-scrolling:touch}.tp.active{display:block}
#tab-story{display:none;flex-direction:column;overflow:hidden}
#tab-story.active{display:flex}
#slog{flex:1;overflow-y:auto;padding-bottom:.5em;-webkit-overflow-scrolling:touch}
#cpop,#sia{flex-shrink:0}
/* ---- NAV ---- */
#gnav{display:flex;background:linear-gradient(to top,var(--bg2),var(--bg3));border-top:1px solid var(--bdr);min-height:52px}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.1em;cursor:pointer;color:var(--txt3);font-size:.65em;padding:.3em 0;transition:.2s;border-top:2px solid transparent;position:relative}
.ni.ac{color:var(--gold);border-top-color:var(--gold)}.ni.ac::after{content:'';position:absolute;top:-2px;left:20%;right:20%;height:2px;background:var(--gold);box-shadow:0 0 8px var(--gold)}
.ni svg{width:18px;height:18px;fill:currentColor}
/* ---- STORY ---- */
#slog{min-height:100px;margin-bottom:.6em;padding-bottom:.5em}
.se{margin-bottom:.8em;padding:.7em .9em;background:var(--bg3);border-left:2px solid var(--goldD);border-radius:0 3px 3px 0;animation:fi .5s;font-size:.9em;line-height:1.75}
.se.sys{border-left-color:var(--red);background:rgba(192,57,43,.06);font-size:.82em;color:var(--txt2)}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* Story input area with triangle */
#sia{display:flex;gap:.4em;align-items:flex-end}
#si{flex:1;padding:.55em .7em;background:var(--bg2);border:1px solid var(--bdr);color:var(--txt);font:inherit;font-size:.85em;resize:none;min-height:38px;max-height:90px;border-radius:2px}
#si:focus{outline:none;border-color:var(--goldD)}
#ctri{width:36px;height:38px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border:1px solid var(--bdr);cursor:pointer;color:var(--gold);font-size:.9em;border-radius:2px;flex-shrink:0;transition:.2s}
#ctri:hover{background:var(--bg4);border-color:var(--gold)}
#ctri.open{background:var(--goldG);border-color:var(--gold)}
#cpop{display:none;background:var(--bg3);border:1px solid var(--bdrG);border-radius:4px;padding:.5em;margin-bottom:.5em;box-shadow:0 2px 12px rgba(0,0,0,.4)}
#cpop.open{display:flex;flex-direction:column;gap:.4em}
#cpop .cbtn{text-align:left;display:block;width:100%;padding:.55em .8em;background:var(--bg4);border:1px solid var(--bdr);color:var(--txt);font:inherit;font-size:.82em;cursor:pointer;transition:.2s;border-radius:2px;line-height:1.5}
#cpop .cbtn:hover{border-color:var(--gold);background:var(--goldG);color:var(--gold)}
#cpop .cbtn .clab{color:var(--gold);font-weight:700;margin-right:.4em}
#cpop .ctitle{font-size:.72em;color:var(--txt3);text-align:center;padding:.2em 0;letter-spacing:.1em}
.sld{text-align:center;color:var(--txt3);padding:.8em}.sld .dt span{animation:bk 1.4s infinite;font-size:1.1em}.sld .dt span:nth-child(2){animation-delay:.2s}.sld .dt span:nth-child(3){animation-delay:.4s}
@keyframes bk{0%,80%,100%{opacity:0}40%{opacity:1}}
@keyframes toastIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-20px)}}
.se-letter{background:var(--bg4);border:1px solid var(--goldD);border-radius:4px;padding:1em;margin:.8em 0;position:relative}
.se-letter::before{content:'✉ 书信';position:absolute;top:-10px;left:10px;background:var(--bg3);padding:0 8px;color:var(--gold);font-size:.75em;border:1px solid var(--goldD);border-radius:2px}
.se-letter .sender{color:var(--gold);font-weight:700;margin-bottom:.5em;font-size:.9em}
.se-letter .content{color:var(--txt);line-height:1.8;white-space:pre-wrap;font-size:.9em}
/* ---- MAP - Circular Nodes ---- */
.mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8em}
.mbc{display:flex;gap:.2em;flex-wrap:wrap;font-size:.8em;align-items:center}
.mbc span{color:var(--txt2);cursor:pointer;padding:.1em .3em}.mbc span:hover{color:var(--gold)}.mbc span.cur{color:var(--gold);cursor:default;font-weight:700}
.mbc .sep{color:var(--txt3);cursor:default}
.mbgu{width:30px;height:30px;border:1px solid var(--bdr);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.75em;color:var(--txt3);transition:.2s}
.mbgu:hover{border-color:var(--gold);color:var(--gold)}
.mwrap{position:relative;width:100%;aspect-ratio:1/1;max-width:360px;margin:0 auto}
.mring{position:absolute;inset:0}
.mn{position:absolute;width:68px;height:68px;border:1.5px solid rgba(201,168,76,.2);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.3s;background:transparent}
.mn:hover{border-color:var(--gold);box-shadow:0 0 18px rgba(201,168,76,.2);transform:scale(1.08)}
.mn.here{border-color:var(--gold);box-shadow:0 0 12px rgba(201,168,76,.15)}
.mn .nm{font-size:.65em;color:var(--txt);text-align:center;line-height:1.2;max-width:62px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mn .tp2{font-size:.48em;color:var(--txt3);margin-top:.1em}
/* Map popup */
.mpop{display:none;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--bg3);border:1px solid var(--bdr);border-radius:4px;padding:1.2em;z-index:20;min-width:220px;box-shadow:0 8px 30px rgba(0,0,0,.6)}
.mpop.open{display:block}.mpop h4{color:var(--gold);margin-bottom:.5em;text-align:center}.mpop .mpi{font-size:.82em;color:var(--txt2);margin-bottom:.8em;text-align:center}
.mpop .mpa{display:flex;flex-direction:column;gap:.4em}
/* ---- CHAR LIST ---- */
.cl{display:flex;flex-direction:column;gap:.5em}
.cc2{display:flex;gap:.7em;padding:.7em;background:var(--bg3);border:1px solid var(--bdr);border-radius:3px;cursor:pointer;transition:.2s;position:relative}
.cc2:hover{background:var(--bg4);border-color:var(--bdrG)}
.ca{width:44px;height:44px;border-radius:50%;border:1px solid var(--goldD);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:1.3em;flex-shrink:0;overflow:hidden;position:relative}
.ca img{width:100%;height:100%;object-fit:cover}
.ca .avol{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);opacity:0;transition:.2s;font-size:.5em;color:var(--goldL);cursor:pointer}.ca:hover .avol{opacity:1}
.ci{flex:1;min-width:0}.ci .cn{color:var(--gold);font-size:.88em}.ci .cd{color:var(--txt2);font-size:.75em}.ci .cm{color:var(--txt3);font-size:.72em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.15em}
.fb{width:55px;height:5px;background:var(--bg2);border-radius:3px;margin-top:.25em;overflow:hidden}.fb .fl{height:100%;background:linear-gradient(90deg,var(--redD),var(--gold));border-radius:3px;transition:.3s}
.cc2 .cdel{position:absolute;top:4px;right:6px;width:18px;height:18px;border-radius:50%;background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);color:var(--red);font-size:.65em;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:.2s;z-index:2}
.cc2:hover .cdel{opacity:1}.cc2 .cdel:hover{background:rgba(192,57,43,.35);border-color:var(--red)}
.cc2 .cchk{position:absolute;top:4px;left:6px;z-index:2;accent-color:var(--gold);width:15px;height:15px;cursor:pointer}
.char-bar{display:flex;justify-content:space-between;align-items:center;padding:.4em .6em;background:var(--bg4);border:1px solid var(--bdr);border-radius:3px;margin-bottom:.6em;font-size:.82em}
.char-bar .cb-left{display:flex;gap:.6em;align-items:center;color:var(--txt2)}
.char-bar .cb-left label{display:flex;align-items:center;gap:.3em;cursor:pointer}
.char-bar .cb-left input{accent-color:var(--gold)}
/* ---- PANEL ---- */
.ps{margin-bottom:1.3em}.ps h3{color:var(--gold);font-size:.95em;margin-bottom:.5em;padding-bottom:.25em;border-bottom:1px solid var(--bdr);letter-spacing:.08em}
.idc{display:flex;gap:.8em;padding:.8em;background:var(--bg3);border:1px solid var(--bdr);border-radius:3px}
.ida{width:72px;height:72px;border-radius:50%;border:2px solid var(--goldD);object-fit:cover;flex-shrink:0}
.idi{flex:1;font-size:.82em}.idi .r{display:flex;justify-content:space-between;padding:.12em 0}.idi .lb{color:var(--txt2)}.idi .vl{color:var(--txt)}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:.4em}
.ai{padding:.45em .6em;background:var(--bg3);border:1px solid var(--bdr);border-radius:2px}
.ai .an{color:var(--txt2);font-size:.72em}.ai .av2{color:var(--gold);font-size:1.05em;margin-top:.1em}
.rd{display:flex;gap:.3em;flex-wrap:wrap;margin-bottom:.4em}
.rr{width:26px;height:26px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:.55em;color:#fff;font-weight:700}
.rr.wh{border-color:#ccc;background:rgba(255,255,255,.12)}.rr.ye{border-color:#e8b830;background:rgba(232,184,48,.15)}
.rr.pu{border-color:#9b59b6;background:rgba(155,89,182,.15)}.rr.bk{border-color:#555;background:rgba(0,0,0,.3)}
.rr.re{border-color:#e74c3c;background:rgba(231,76,60,.15)}.rr.gl{border-color:#f1c40f;background:rgba(241,196,15,.2)}
.rr.em{border-color:var(--bdr);border-style:dashed;background:transparent}
.sl{display:flex;flex-direction:column;gap:.35em}
.ski{padding:.5em;background:var(--bg3);border:1px solid var(--bdr);border-radius:2px}.ski .skn{color:var(--goldL);font-size:.85em}.ski .skd{color:var(--txt2);font-size:.78em;margin-top:.1em}
/* ---- INV ---- */
.it{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:.8em}
.itb{padding:.4em .8em;cursor:pointer;color:var(--txt3);font-size:.85em;border-bottom:2px solid transparent;transition:.2s}
.itb.ac{color:var(--gold);border-bottom-color:var(--gold)}
.ig{display:flex;flex-direction:column;gap:.4em}
.ii{display:flex;gap:.6em;padding:.5em;background:var(--bg3);border:1px solid var(--bdr);border-radius:2px;align-items:center}
.ii .ic{width:36px;height:36px;background:var(--bg2);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:1.1em;flex-shrink:0;border-radius:2px}
.ii .iif{flex:1}.ii .iin{color:var(--goldL);font-size:.85em}.ii .iid{color:var(--txt3);font-size:.72em}
.emp{text-align:center;color:var(--txt3);padding:1.5em;font-size:.85em}
/* ---- HISTORY ---- */
.htg{cursor:pointer;padding:.5em;background:var(--bg3);border:1px solid var(--bdr);color:var(--gold);display:flex;justify-content:space-between;align-items:center;margin-bottom:.4em;font-size:.9em;border-radius:2px}
.htc{max-height:0;overflow:hidden;transition:.3s}.htc.open{max-height:9999px}
.he{padding:.4em;border-bottom:1px solid rgba(37,37,56,.5);font-size:.8em;color:var(--txt2)}.he .tn{color:var(--goldD);font-size:.7em}
/* ---- SETTINGS ---- */
.sg{margin-bottom:1.3em}.sg h3{color:var(--gold);font-size:.95em;margin-bottom:.5em;border-bottom:1px solid var(--bdr);padding-bottom:.25em}
.sti{display:flex;justify-content:space-between;align-items:center;padding:.5em 0;border-bottom:1px solid rgba(37,37,56,.4);font-size:.88em}
.sti .lb{color:var(--txt2)}
.tho{display:flex;gap:.4em;margin-top:.4em}
.tho div{width:32px;height:32px;border:2px solid var(--bdr);cursor:pointer;border-radius:2px;transition:.2s}
.tho div.ac{border-color:var(--gold);box-shadow:var(--glow)}
.tho .td{background:linear-gradient(135deg,#080810,#161625)}.tho .ti{background:linear-gradient(135deg,#f5f0e6,#ede5d5)}
.tho .tc{background:linear-gradient(135deg,#06001a,#180048)}.tho .tb{background:linear-gradient(135deg,#0c0404,#2a0e0e)}.tho .tj{background:linear-gradient(135deg,#040e08,#0e2818)}
.ss{display:flex;flex-direction:column;gap:.4em}
.sv{display:flex;justify-content:space-between;align-items:center;padding:.5em;background:var(--bg3);border:1px solid var(--bdr);border-radius:2px}
.sv .si2{font-size:.8em;color:var(--txt2)}.sv .sa{display:flex;gap:.3em}
/* ---- MODAL ---- */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;justify-content:center;align-items:center;padding:.8em;backdrop-filter:blur(2px)}
.mo.ac{display:flex}.mb{background:var(--bg3);border:1px solid var(--bdr);max-width:480px;width:100%;max-height:82vh;overflow-y:auto;padding:1.3em;position:relative;border-radius:4px}
.mc{position:absolute;top:.4em;right:.6em;color:var(--txt3);cursor:pointer;font-size:1.2em;background:none;border:none}.mc:hover{color:var(--gold)}
/* ---- UTIL ---- */
.hid{display:none!important}
/* ---- WPLIB ---- */
.wpi{display:flex;gap:.6em;padding:.55em .7em;background:var(--bg3);border:1px solid var(--bdr);border-radius:3px;margin-bottom:.4em;cursor:pointer;transition:.2s;align-items:center}
.wpi:hover{background:var(--bg4);border-color:var(--bdrG)}
.wpi.selected{border-color:var(--gold);background:var(--goldG)}
.wpi .wpi-icon{width:36px;height:36px;background:var(--bg2);border:1px solid var(--bdr);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1em;flex-shrink:0}
.wpi .wpi-info{flex:1;min-width:0}.wpi .wpi-name{color:var(--goldL);font-size:.85em}.wpi .wpi-type{color:var(--txt3);font-size:.7em}
.wpi .wpi-desc{color:var(--txt2);font-size:.72em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wpi .wpi-del{width:20px;height:20px;border-radius:50%;background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);color:var(--red);font-size:.6em;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:.2s;flex-shrink:0}
.wpi:hover .wpi-del{opacity:1}.wpi .wpi-del:hover{background:rgba(192,57,43,.35)}
@media(max-width:400px){:root{--fs:13px}.btn{padding:.45em 1em}}
</style>
</head>
<body>
<div id="toast-container" style="position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:90%;max-width:400px"></div>
<!-- COVER -->
<div id="cover" class="screen active">
<div class="cbg" id="cbg"></div>
<div class="cc">
<h1>斗罗大陆·启魂录</h1>
<p class="sub">武魂觉醒 · 命由己定</p>
<div class="bg">
<button class="btn pri" onclick="UI.go('char-create')">开始游戏</button>
<button class="btn" onclick="UI.goLoad()">读取存档</button>
<button class="btn" onclick="UI.go('api-setup')">连接API</button>
</div>
</div>
</div>
<!-- API -->
<div id="api-setup" class="screen">
<div class="sbox">
<h2>连接API</h2>
<div class="fg"><label>API端点</label><input id="aep" placeholder="https://api.example.com/v1"></div>
<div class="fg"><label>API密钥</label><input type="password" id="akey" placeholder="sk-..."></div>
<div class="fg"><label>模型</label>

/* ========== API ========== */
const API={
  fetch:async()=>{
    const ep=$('aep').value.trim().replace(/\/+$/,''),k=$('akey').value.trim();
    if(!ep){$('ast').textContent='请填写端点';return}
    $('ast').textContent='拉取中...';
    try{
      const r=await fetch(ep+'/models',{headers:{'Authorization':'Bearer '+k}});
      if(!r.ok)throw new Error(r.status);
      const d=await r.json(),ms=(d.data||d).map(m=>m.id||m.name||m).filter(Boolean);
      const s=$('asel');s.innerHTML='<option value="">选择模型</option>'+ms.map(m=>`<option value="${m}">${m}</option>`).join('');
      s.classList.remove('hid');$('alist').textContent=`${ms.length}个模型`;$('ast').textContent='拉取成功';
    }catch(e){$('ast').textContent='失败: '+e.message}
  },
  save:()=>{
    G.ep=$('aep').value.trim().replace(/\/+$/,'');G.key=$('akey').value.trim();G.mod=$('amod').value.trim();
    if(!G.ep||!G.mod){$('ast').textContent='请填写端点和模型';return}
    localStorage.setItem('dl_api',JSON.stringify({e:G.ep,k:G.key,m:G.mod}));
    $('ast').textContent='已保存';setTimeout(()=>UI.go('cover'),400);
  },
  load:()=>{try{const d=JSON.parse(localStorage.getItem('dl_api'));if(d){G.ep=d.e||'';G.key=d.k||'';G.mod=d.m||'';$('aep').value=G.ep;$('akey').value=G.key;$('amod').value=G.mod}}catch(e){}},
  call:async(msgs,t=0.92)=>{
    if(!G.ep||!G.mod)throw new Error('请先连接API（封面→连接API）');
    const r=await fetch(G.ep+'/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+G.key},
      body:JSON.stringify({model:G.mod,messages:msgs,temperature:t,max_tokens:4000})});
    if(!r.ok){const t2=await r.text();throw new Error(`API错误(${r.status}): ${t2.slice(0,200)}`)}
    const d=await r.json();return d.choices[0].message.content;
  }
};

/* ========== STORY ENGINE ========== */
const Story={
  add:(txt,cls='')=>{
    const d=document.createElement('div');d.className='se '+(cls||'');d.innerHTML=txt.replace(/\n/g,'<br>');
    $('slog').appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'});
    G.log.push({t:txt,c:cls,n:G.turn});G.hist.push({t:txt.slice(0,150)+(txt.length>150?'...':''),n:G.turn});
  },
  loading:()=>{const d=document.createElement('div');d.className='sld';d.id='sld';d.innerHTML='正在生成剧情<span class="dt"><span>.</span><span>.</span><span>.</span></span>';$('slog').appendChild(d);d.scrollIntoView({behavior:'smooth'})},
  unload:()=>{const e=$('sld');if(e)e.remove()},

  /* --- 解析器：处理【选项A/B/C/D】格式 + 所有变动标记 --- */
  parse:(txt)=>{
    const ch=[], opts=[], letters=[], toasts=[];

    // 提取选项
    const optRx=/【选项([A-Da-d])】\s*(.+?)(?=【选项[A-Da-d]】|$)/gs;
    let om;
    while((om=optRx.exec(txt))!==null) opts.push(om[2].trim());

    if(opts.length===0){
      const oldRx=/[①②③④⑤]\s*(.+)/g;
      while((om=oldRx.exec(txt))!==null) opts.push(om[1].trim());
    }

    // 提取书信 【书信:角色名|内容】
    const letterRx=/【书信[:：]([^|]+)\|([\s\S]*?)】/g;
    let lm;
    while((lm=letterRx.exec(txt))!==null) {
      letters.push({sender:lm[1].trim(), content:lm[2].trim()});
    }

    // 提取活动/系统提示 【活动:xxx】 或 【系统:xxx】
    const toastRx=/【(活动|系统|移动|互动|弹幕)[:：](.+?)】/g;
    let tm;
    while((tm=toastRx.exec(txt))!==null) {
      toasts.push({type:tm[1], msg:tm[2].trim()});
    }

    // 提取所有变动标记
    const ps=[
      [/【武魂觉醒[:：](.+?)】/g,'wp'],
      [/【先天魂力[:：](\d+)】/g,'inn'],
      [/【体质[:：](\d+)】/g,'con_s'],[/【精神力[:：](\d+)】/g,'spr_s'],
      [/【悟性[:：](\d+)】/g,'com_s'],[/【魅力[:：](\d+)】/g,'cha_s'],[/【运气[:：](\d+)】/g,'lck_s'],
      [/【魂力([+-]\d+)】/g,'sp'],
      [/【金魂币([+-]\d+)】/g,'gold'],[/【银魂币([+-]\d+)】/g,'silver'],[/【铜魂币([+-]\d+)】/g,'copper'],
      [/【体质([+-]\d+)】/g,'con'],[/【精神力([+-]\d+)】/g,'spr'],
      [/【悟性([+-]\d+)】/g,'com'],[/【魅力([+-]\d+)】/g,'cha'],
      [/【魂环[:：](.+?)】/g,'ring'],[/【魂骨[:：](.+?)】/g,'bone'],
      [/【结识[:：](.+?)】/g,'meet'],
      [/【获得[:：](.+?)】/g,'iadd'],[/【失去[:：](.+?)】/g,'irem'],
      [/【物品\+(.+?)】/g,'iadd'],[/【物品[-](.+?)】/g,'irem'],
      [/【年龄\+(\d+)】/g,'age'],
      [/【到达[:：](.+?)】/g,'loc']
    ];
    ps.forEach(([rx,tp])=>{let m;while((m=rx.exec(txt))!==null)ch.push({tp,v:m[1]})});

    // 清洗叙事文本（去掉标记和选项）
    let nar=txt
      .replace(/【选项[A-Da-d]】\s*.+/g,'')
      .replace(/[①②③④⑤]\s*.+/g,'')
      .replace(/【书信[:：][^|]+\|[\s\S]*?】/g, '')
      .replace(/【(活动|系统|移动|互动|弹幕)[:：].+?】/g, '')
      .replace(/【.+?】/g,'')
      .trim();

    return{nar,ch,opts,letters,toasts};
  },

  /* --- 应用变动到玩家状态 --- */
  apply:(changes, letters, toasts)=>{
    const p=G.player;if(!p)return;const mq=[];
    changes.forEach(c=>{
      const v=c.v;
      switch(c.tp){
        case'wp':{const pts=v.split(',');p.wp=pts[0].trim();p.wpQ=pts[1]?pts[1].trim():'普通';break}
        case'inn':p.inn=parseInt(v);p.lv=p.inn;p.sp=0;break;
        case'con_s':p.st.con=parseInt(v);break;case'spr_s':p.st.spr=parseInt(v);break;
        case'com_s':p.st.com=parseInt(v);break;case'cha_s':p.st.cha=parseInt(v);break;case'lck_s':p.st.lck=parseInt(v);break;
        case'sp':{
          const d=parseInt(v);p.sp=(p.sp||0)+d;
          while(p.sp>=100){
            if(p.lv%10===0&&p.lv>0&&p.lv<=90){p.sp=99;Story.add('⚠ 魂力达到'+p.lv+'级瓶颈，需吸收魂环方可突破！','sys');break}
            p.sp-=100;p.lv++;
          }
          if(p.sp<0)p.sp=0;break;
        }
        case'gold':p.mn.g=Math.max(0,p.mn.g+parseInt(v));break;
        case'silver':p.mn.s=Math.max(0,p.mn.s+parseInt(v));break;
        case'copper':p.mn.c=Math.max(0,p.mn.c+parseInt(v));break;
        case'con':p.st.con=clamp(p.st.con+parseInt(v),1,100);break;
        case'spr':p.st.spr=clamp(p.st.spr+parseInt(v),1,100);break;
        case'com':p.st.com=clamp(p.st.com+parseInt(v),1,100);break;
        case'cha':p.st.cha=clamp(p.st.cha+parseInt(v),1,100);break;
        case'ring':{
          const pts=v.split(',');if(pts.length>=4){
            const r={color:pts[0].trim(),yrs:parseInt(pts[1]),beast:pts[2].trim(),skill:pts[3].trim(),desc:pts[4]?pts[4].trim():''};
            p.rings.push(r);p.skills.push({name:r.skill,desc:r.desc,ring:p.rings.length});
            if(p.lv%10===0){p.lv++;p.sp=0}
            G.inv.rings.push({name:`${r.color}魂环（${r.yrs}年${r.beast}）`,desc:r.skill,eq:true});
          }break;
        }
        case'bone':{
          const pts=v.split(',');if(pts.length>=3){
            const b={part:pts[0].trim(),name:pts[1].trim(),skill:pts[2].trim(),desc:pts[3]?pts[3].trim():''};
            p.bones.push(b);G.inv.bones.push({name:`${b.part}·${b.name}`,desc:b.skill+(b.desc?'：'+b.desc:''),eq:false,data:b});
          }break;
        }
        case'meet':{
          const pts=v.split(',');if(pts.length>=2){
            mq.push({
              name:pts[0].trim(), id:pts[1]?pts[1].trim():'未知',
              wp:pts[2]?pts[2].trim():'未知', inn:parseInt(pts[3])||0,
              lv:parseInt(pts[4])||0, per:pts[5]?pts[5].trim():'未知',
              imp:pts[6]?pts[6].trim():'初次见面',
              fav:10, cimp:pts[6]?pts[6].trim():'初次见面', av:null
            });
          }break;
        }
        case'iadd':G.inv.misc.push({name:v.trim(),desc:''});break;
        case'irem':{const i=G.inv.misc.findIndex(x=>x.name===v.trim());if(i>=0)G.inv.misc.splice(i,1);break}
        case'age':p.age+=parseInt(v);break;
        case'loc':break; // map hint only
      }
    });
    UI.updHdr();UI.updPanel();Inv.render();
    if(mq.length)Story.procMQ(mq,0);
    
    // 处理书信
    if(letters && letters.length) {
      letters.forEach(l => {
        const d=document.createElement('div');
        d.className='se se-letter';
        d.innerHTML=`<div class="sender">✉ 来自：${l.sender}</div><div class="content">${l.content.replace(/\n/g,'<br>')}</div>`;
        $('slog').appendChild(d);
        d.scrollIntoView({behavior:'smooth',block:'end'});
        G.log.push({t:`[书信] ${l.sender}: ${l.content.slice(0,50)}...`,c:'letter',n:G.turn});
      });
    }
    // 处理弹窗/弹幕
    if(toasts && toasts.length) {
      toasts.forEach(t => {
        UI.toast(t.msg, t.type === '活动' ? 'event' : 'sys');
      });
    }
  },

  procMQ:(q,i)=>{
    if(i>=q.length)return;const c=q[i];
    if(G.chars.find(x=>x.name===c.name)){Story.procMQ(q,i+1);return}
    G._pm=c;G._mq=q;G._mi=i;
    $('mmn').textContent=c.name;
    $('mmd').textContent=`${c.id} · 武魂：${c.wp||'无'} · ${c.per}`;
    $('mmd2').textContent=`"${c.imp}"`;
    $('mmod').classList.add('ac');
  },

  /* --- 发送动作到API --- */
  send:async(act)=>{
    if(G.gen)return;
    const inp=act||$('si').value.trim();if(!inp)return;
    $('si').value='';
    G._choices=[];$('cpop').innerHTML='';$('cpop').classList.remove('open');$('ctri').classList.remove('open');$('ctri').textContent='△';
    G.gen=true;$('story-send').disabled=true;
    Story.add('▸ '+inp,'sys');
    G.ctx.push({role:'user',content:inp});
    const cmsgs=G.ctx.slice(-40);
    const msgs=[{role:'system',content:PB.sys()},...cmsgs];
    Story.loading();
    try{
      const res=await API.call(msgs);Story.unload();
      const {nar,ch,opts,letters,toasts}=Story.parse(res);
      if(nar)Story.add(nar);
      Story.apply(ch, letters, toasts);
      if(opts.length)Story.setChoices(opts);
      G.ctx.push({role:'assistant',content:res});G.turn++;
    }catch(e){Story.unload();Story.add('⚠ '+e.message,'sys')}
    G.gen=false;$('story-send').disabled=false;
  },

  /* --- 设置选项到△折叠面板并自动展开 --- */
  setChoices:(opts)=>{
    G._choices=opts;
    const labels=['A','B','C','D'];
    $('cpop').innerHTML='<div class="ctitle">— 剧情选项 —</div>'+
      opts.map((o,i)=>`<button class="cbtn" onclick="Story.pickChoice(${i})"><span class="clab">${labels[i]||i+1}.</span>${o}</button>`).join('');
    // 自动展开选项面板
    $('cpop').classList.add('open');
    $('ctri').classList.add('open');
    $('ctri').textContent='▽';
    $('ctri').style.color='var(--gold)';
    $('ctri').title=`${opts.length}个选项`;
  },

  pickChoice:(i)=>{
    if(!G._choices[i])return;
    // 收起选项面板
    $('cpop').classList.remove('open');$('ctri').classList.remove('open');$('ctri').textContent='△';
    Story.send(G._choices[i]);
  },

  /* --- 开始游戏剧情 --- */
  start:async()=>{
    if(!G.ep||!G.mod){Story.add('⚠ 请先在封面「连接API」配置后再开始游戏。可在底部「设置」中重新配置。','sys');return}
    G.gen=true;Story.loading();
    G.ctx=[{role:'user',content:'开始游戏，进行武魂觉醒仪式。请严格按输出格式生成800字以上叙事+全部变动标记+4个【选项A/B/C/D】。'}];
    const msgs=[{role:'system',content:PB.awaken(G.player)},G.ctx[0]];
    try{
      const res=await API.call(msgs);Story.unload();
      const {nar,ch,opts,letters,toasts}=Story.parse(res);
      if(nar)Story.add(nar);
      Story.apply(ch, letters, toasts);
      if(opts.length)Story.setChoices(opts);
      G.ctx.push({role:'assistant',content:res});G.turn=1;
    }catch(e){Story.unload();Story.add('⚠ '+e.message+'\n请检查API连接设置。','sys')}
    G.gen=false;
  }
};

      if(i<p.rings.length){const r=p.rings[i];const cc=Object.entries(rc).find(([k])=>r.color.includes(k));

      else rh+=`<div class="rr em">${i+1}</div>`}

    $('psk').innerHTML=p.skills.length?p.skills.map(s=>`<div class="ski"><div class="skn">第${s.ring}魂技·${s.name}</div><div class="skd">${s.desc}</div></div>`).join(''):'<div class="emp">尚无魂技</div>';

  },

  _charSel:{},

  renderChars:()=>{
    const l=$('clist'),e=$('noc'),bar=$('char-bar');
    if(!G.chars.length){l.innerHTML='';e.style.display='block';bar.style.display='none';return}
    e.style.display='none';
    bar.style.display='flex';

    $('char-selcount').textContent=`已选${selCount}人`;
    $('char-selall').checked=selCount===G.chars.length&&G.chars.length>0;

/* ========== MAP (圆形节点) ========== */
const Map={
  render:()=>{
    $('mbc').innerHTML=G.map.map((l,i)=>{
      const cur=i===G.map.length-1;
      return(i>0?'<span class="sep">›</span>':'')+(cur?`<span class="cur">${l}</span>`:`<span onclick="Map.nav(${i})">${l}</span>`);
    }).join('');
    let node=SD.mt;for(const l of G.map){if(node[l])node=node[l].c||{};else break}
    const keys=Object.keys(node);
    const ring=$('mring');
    $('mpop').classList.remove('open');
    if(!keys.length){ring.innerHTML='<div class="emp" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">此地无更多区域可探索</div>';return}
    const cx=50,cy=50,radius=keys.length<=4?28:keys.length<=8?34:37;
    ring.innerHTML=keys.map((k,i)=>{
      const angle=(2*Math.PI*i/keys.length)-Math.PI/2;
      const x=cx+radius*Math.cos(angle)-5;
      const y=cy+radius*Math.sin(angle)-5;
      const d=node[k],tp=d.t||'区域';
      const here=G.map[G.map.length-1]===k;
      return`<div class="mn${here?' here':''}" style="left:${x}%;top:${y}%" onclick="Map.click('${k}')"><div class="nm">${k}</div><div class="tp2">${tp}</div></div>`;
    }).join('')+`<div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:.25"></div>`;
    if(G.mapBg){$('mwrap').style.backgroundImage=`url(${G.mapBg})`;$('mwrap').style.backgroundSize='cover'}
  },
  click:(k)=>{
    let node=SD.mt;for(const l of G.map){if(node[l])node=node[l].c||{};else break}
    const d=node[k];if(!d)return;
    const hasC=d.c&&Object.keys(d.c).length>0;
    $('mpop').innerHTML=`<h4>${k}</h4>
      <p class="mpi">${d.t}${hasC?' · '+Object.keys(d.c).length+'个子区域':' · 终点区域'}</p>
      <div class="mpa">
        ${hasC?`<button class="btn sm pri" onclick="Map.enter('${k}')">进入查看</button>`:''}
        <button class="btn sm" onclick="Map.goStory('${k}')">前往此处</button>
        <button class="btn sm" onclick="$('mpop').classList.remove('open')">关闭</button>
      </div>`;
    $('mpop').classList.add('open');
  },
  enter:(k)=>{G.map.push(k);$('mpop').classList.remove('open');Map.render()},
  nav:(i)=>{G.map=G.map.slice(0,i+1);$('mpop').classList.remove('open');Map.render()},
  goStory:(k)=>{$('mpop').classList.remove('open');UI.tab('story');Story.send('前往'+k+'探索')},
  bgUp:(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{G.mapBg=ev.target.result;Map.render()};r.readAsDataURL(f)}
};

/* ========== INVENTORY ========== */
const Inv={
  ct:'misc',
  tab:(t)=>{
    Inv.ct=t;
    document.querySelectorAll('.itb').forEach(b=>{
      const map={misc:'杂物',bones:'魂骨',rings:'魂环'};
      b.classList.toggle('ac',b.textContent===map[t]);
    });
    Inv.render();
  },
  render:()=>{
    const items=G.inv[Inv.ct]||[];
    if(!items.length){$('ilist').innerHTML='';$('iemp').style.display='block';return}
    $('iemp').style.display='none';
    const ic={misc:'📦',bones:'🦴',rings:'💍'};
    $('ilist').innerHTML=items.map((it,i)=>`<div class="ii"><div class="ic">${ic[Inv.ct]}</div><div class="iif"><div class="iin">${it.name}</div><div class="iid">${it.desc||''}</div></div>${Inv.ct==='bones'?`<button class="btn sm${it.eq?' dis':''}" onclick="Inv.eqBone(${i})">${it.eq?'已装备':'装备'}</button>`:''}</div>`).join('');
  },
  eqBone:(i)=>{
    const b=G.inv.bones[i];if(!b||b.eq)return;const p=G.player;
    if(p.bones.length>=6){alert('最多装备6块魂骨');return}
    if(b.data&&p.bones.find(x=>x.part===b.data.part)){alert('该部位已有魂骨');return}
    b.eq=true;if(b.data&&!p.bones.find(x=>x.name===b.data.name))p.bones.push(b.data);
    Inv.render();UI.updPanel();
  }
};

/* ========== SAVE ========== */
const Save={
  save:(s)=>{
    const d={player:G.player,chars:G.chars,log:G.log.slice(-60),hist:G.hist.slice(-120),inv:G.inv,map:G.map,turn:G.turn,ctx:G.ctx.slice(-30),theme:G.theme,fs:G.fs,ts:Date.now()};
    try{localStorage.setItem('dl_s'+s,JSON.stringify(d));alert('存档成功');UI.renderSet()}catch(e){alert('存档失败：'+e.message)}
  },
  load:(s)=>{
    try{
      const raw=localStorage.getItem('dl_s'+s);if(!raw){alert('空存档');return}const d=JSON.parse(raw);
      G.player=d.player;G.chars=d.chars||[];G.log=d.log||[];G.hist=d.hist||[];
      G.inv=d.inv||{misc:[],bones:[],rings:[]};G.map=d.map||['斗罗大陆'];
      G.turn=d.turn||0;G.ctx=d.ctx||[];G._choices=[];
      if(d.theme)UI.setTh(d.theme);
      if(d.fs){G.fs=d.fs;document.documentElement.style.setProperty('--fs',d.fs+'px')}
      UI.go('game');UI.updHdr();UI.updPanel();Map.render();Inv.render();
      // Restore story log
      $('slog').innerHTML='';
      G.log.forEach(en=>{const dv=document.createElement('div');dv.className='se '+(en.c||'');dv.innerHTML=en.t.replace(/\n/g,'<br>');$('slog').appendChild(dv)});
      // Restore choices from last assistant message
      $('cpop').innerHTML='';
      if(G.ctx.length){const last=G.ctx[G.ctx.length-1];if(last.role==='assistant'){const{opts}=Story.parse(last.content);if(opts.length)Story.setChoices(opts)}}
      alert('读取成功');
    }catch(e){alert('读取失败：'+e.message)}
  }
};

    if(!sel||!pv)return;
    const name=sel.value;
    if(!name){pv.textContent='';WpLib._selected=null;return}
    const w=WpLib.getAll().find(x=>x.name===name);
    if(w){pv.textContent=`${w.type} · [${w.quality||'未知'}] · ${w.desc||'无描述'}`;WpLib._selected=w}
    else{pv.textContent='';WpLib._selected=null}
  },

  render:(filter='')=>{
    const all=WpLib.getAll();
    const fl=filter.toLowerCase();
    const filtered=fl?all.filter(w=>w.name.toLowerCase().includes(fl)||w.type.includes(fl)||(w.desc||'').toLowerCase().includes(fl)):all;
    const icons={器武魂:'🗡️',兽武魂:'🐾',植物武魂:'🌿',元素武魂:'🔮',特殊武魂:'✨'};
    const list=$('wplib-list');
    if(!filtered.length){list.innerHTML='<div class="emp">没有找到匹配的武魂</div>';$('wplib-count').textContent='';return}
    list.innerHTML=filtered.map((w,i)=>{
      const isCustom=WpLib._custom.includes(w);
      const isSelected=WpLib._selected&&WpLib._selected.name===w.name;
      return`<div class="wpi${isSelected?' selected':''}" onclick="WpLib.select('${w.name.replace(/'/g,"\\'")}')">
        <div class="wpi-icon">${icons[w.type]||'🔮'}</div>
        <div class="wpi-info">
          <div class="wpi-name">${w.name} <span style="font-size:.8em;color:var(--gold)">[${w.quality||'未知'}]</span></div>
          <div class="wpi-type">${w.type}${isCustom?' · 自定义':''}</div>
          <div class="wpi-desc">${w.desc||'无描述'}</div>
        </div>
        ${isCustom?`<div class="wpi-del" onclick="event.stopPropagation();WpLib.delCustom('${w.name.replace(/'/g,"\\'")}')" title="删除">✕</div>`:''}
      </div>`}).join('');
    $('wplib-count').textContent=`共 ${all.length} 个武魂（预置 ${WpLib._default.length} + 自定义 ${WpLib._custom.length}）· 显示 ${filtered.length} 个`;
  },

  filter:(v)=>WpLib.render(v),

  select:(name)=>{
    const w=WpLib.getAll().find(x=>x.name===name);
    if(!w)return;
    if(WpLib._selected&&WpLib._selected.name===name){
      // 取消选择
      WpLib._selected=null;
    }else{
      WpLib._selected=w;
    }
    // 更新下拉框
    const sel=$('cwp-sel');
    if(sel)sel.value=WpLib._selected?WpLib._selected.name:'';
    WpLib.updPreview();
    WpLib.render($('wplib-search')?$('wplib-search').value:'');
  },

  showAdd:()=>{$('wplib-add').classList.toggle('hid')},

  addCustom:()=>{
    const name=$('wpa-name').value.trim();
    const type=$('wpa-type').value;
    const quality=$('wpa-quality').value;
    const desc=$('wpa-desc').value.trim();
    if(!name){alert('请输入武魂名称');return}
    if(WpLib.getAll().find(w=>w.name===name)){alert('武魂名称已存在');return}
    if(SD.banned.includes(name)){alert('该武魂为禁止武魂，不可添加');return}
    const w={name,type,quality,desc:desc||'用户自定义武魂'};
    WpLib._custom.push(w);
    WpLib.saveCustom();
    WpLib.refreshSelect();
    WpLib.render($('wplib-search')?$('wplib-search').value:'');
    $('wpa-name').value='';$('wpa-desc').value='';
    $('wplib-add').classList.add('hid');
  },

  delCustom:(name)=>{
    if(!confirm(`确定删除自定义武魂「${name}」？`))return;
    WpLib._custom=WpLib._custom.filter(w=>w.name!==name);
    WpLib.saveCustom();
    if(WpLib._selected&&WpLib._selected.name===name)WpLib._selected=null;
    WpLib.refreshSelect();
    WpLib.render($('wplib-search')?$('wplib-search').value:'');
  }
};

/* ========== INIT ========== */
API.load();
WpLib.init();
$('muf').addEventListener('change',e=>{const f=e.target.files[0];if(f){$('bgm').src=URL.createObjectURL(f);$('bgm').play().catch(()=>{})}});
$('si').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();Story.send()}});
</script>
